<section class="movie-category">
  <h2 class="movie-category__title">{{categoryName}}</h2>
  <div class="movie-category__row">
    <button class="movie-category__arrow movie-category__arrow--prev" onclick="this.closest('.movie-category__row').querySelector('.movie-category__list').scrollBy({left: -600, behavior: 'smooth'})">&#8249;</button>
    <div class="movie-category__list">
      {{movies}}
    </div>
    <button class="movie-category__arrow movie-category__arrow--next" onclick="this.closest('.movie-category__row').querySelector('.movie-category__list').scrollBy({left: 600, behavior: 'smooth'})">&#8250;</button>
  </div>
</section>
