<div class="addMovie">
    <h2 class="addMovie__title">Add Movie</h2>
    <form class="addMovie__form">

        <label for="name">Title:</label>
        <input type="text" id="name" name="name" placeholder="Movie title" required>

        <label for="image">Image:</label>
        <input type="text" id="image" name="image" placeholder="Image URL" required>

        <label for="year">Year:</label>
        <input type="number" id="year" name="year" placeholder="Release year" required>

        <label for="length">Length:</label>
        <input type="text" id="length" name="length" placeholder="Duration in minutes" required>

        <label for="description">Description:</label>
        <input type="text" id="description" name="description" placeholder="Movie description" required>

        <label for="director">Director:</label>
        <input type="text" id="director" name="director" placeholder="Director name" required>

        <label for="category">Category:</label>
        <input type="number" id="category" name="category" placeholder="Category" required>

        <label for="trailer">Trailer:</label>
        <input type="text" id="trailer" name="trailer" placeholder="Trailer URL" required>

        <label for="min_age">Minimum Age:</label>
        <select id="min_age" name="min_age" required>
            <option value="0">0</option>
            <option value="6">6</option>
            <option value="12">12</option>
            <option value="16">16</option>
            <option value="18">18</option>
        </select>

        <button type="button" onclick="{{handler}}">Submit</button>
    </form>
</div>
